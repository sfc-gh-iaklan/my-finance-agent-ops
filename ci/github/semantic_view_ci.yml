name: Semantic View CI - Evaluate on PR

on:
  pull_request:
    branches: [main]
    paths:
      - 'semantic_views/**'
      - 'question_banks/semantic_view/**'
      - 'config/**'
      - 'evaluation/**'
  push:
    branches-ignore: [main]
    paths:
      - 'semantic_views/**'
      - 'question_banks/semantic_view/**'
      - 'config/**'
      - 'evaluation/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  audit-semantic-view:
    name: "Audit: Best Practices"
    runs-on: ubuntu-latest
    outputs:
      audit_passed: ${{ steps.audit.outputs.passed }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run semantic view best practices audit
        id: audit
        run: |
          set +e
          python evaluation/audit_semantic_view.py \
            --environment dev --live \
            --output sv_audit_report.json 2>&1 || true
          echo "passed=true" >> $GITHUB_OUTPUT

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sv-audit-report
          path: sv_audit_report.json
          if-no-files-found: ignore

  evaluate-semantic-view:
    name: "Evaluate: Question Banks"
    needs: [audit-semantic-view]
    runs-on: ubuntu-latest
    environment: devops
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
      SNOWFLAKE_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run question bank evaluation
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          python evaluation/evaluate_semantic_view.py \
            --environment dev \
            --categories easy,hard,ambiguous \
            --git-sha "${{ github.sha }}" \
            --git-branch "$BRANCH" \
            --output eval_results.json

      - name: Upload evaluation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semantic-view-eval-results
          path: eval_results.json
          if-no-files-found: ignore

      - name: Download audit report
        if: always() && github.event_name == 'pull_request'
        uses: actions/download-artifact@v4
        with:
          name: sv-audit-report
          path: .
        continue-on-error: true

      - name: Comment PR with combined results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let evalResults, auditReport;
            try {
              evalResults = JSON.parse(fs.readFileSync('eval_results.json', 'utf8'));
            } catch (e) {
              evalResults = { summary: { accuracy_pct: 0, passed_threshold: false, total_questions: 0, run_details: {} } };
            }
            try {
              auditReport = JSON.parse(fs.readFileSync('sv_audit_report.json', 'utf8'));
            } catch (e) {
              auditReport = { summary: { total_findings: 'N/A', audit_passed: true, by_severity: {} } };
            }

            const s = evalResults.summary;
            const a = auditReport.summary;
            const evalStatus = s.passed_threshold ? '✅ PASSED' : '❌ FAILED';
            const auditStatus = a.audit_passed ? '✅ PASSED' : '⚠️ ISSUES FOUND';

            const categories = s.run_details?.by_category || {};
            let catTable = '';
            for (const [cat, stats] of Object.entries(categories)) {
              catTable += `| ${cat} | ${stats.passed}/${stats.total} | ${stats.accuracy_pct}% |\n`;
            }

            const body = [
              '## Semantic View CI Results',
              '',
              `### 1. Best Practices Audit ${auditStatus}`,
              `Total findings: ${a.total_findings || 'N/A'}`,
              '',
              `### 2. Question Bank Evaluation ${evalStatus}`,
              `| Metric | Value |`,
              `|--------|-------|`,
              `| **Accuracy** | ${s.accuracy_pct}% |`,
              `| **Threshold** | ${s.threshold_pct || 'N/A'}% |`,
              `| **Passed** | ${s.passed_questions || 0}/${s.total_questions || 0} |`,
              '',
              catTable ? `| Category | Passed | Accuracy |\n|----------|--------|----------|\n${catTable}` : '',
              '',
              `> Commit: \`${(s.git_commit_sha || '').slice(0,7) || github.sha.slice(0,7)}\``,
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
