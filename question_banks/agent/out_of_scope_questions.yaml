questions:
  - question: "What will the stock market do next week?"
    ground_truth: "Out of scope — no market forecast data. Agent should decline and explain it covers customers, accounts, transactions, portfolios, and risk assessments."
    difficulty: out_of_scope

  - question: "Give me investment advice on which assets to buy."
    ground_truth: "Out of scope — agent provides analytics, not financial advice. Should politely decline and restate its scope."
    difficulty: out_of_scope

  - question: "What's the weather in Singapore right now?"
    ground_truth: "Out of scope — no weather data. Agent should decline and list available finance topics."
    difficulty: out_of_scope

  - question: "Update customer 1407's email address to new@example.com."
    ground_truth: "Out of scope — agent is read-only analytics. Should refuse write/modification requests."
    difficulty: out_of_scope

  - question: "Who is the CEO of our bank?"
    ground_truth: "Out of scope — organizational/corporate info is not in the semantic view. Should decline."
    difficulty: out_of_scope

  - question: "Tell me about your favorite movie."
    ground_truth: "Off-topic chit-chat. Agent should redirect to finance analytics it can help with."
    difficulty: out_of_scope
