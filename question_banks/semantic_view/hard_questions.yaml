questions:
  - question: "What is the total account balance for each customer segment?"
    expected_behavior: "Joins ACCOUNTS to CUSTOMERS on CUSTOMER_ID, groups by CUSTOMER_SEGMENT, sums BALANCE."
    difficulty: hard
    tags: [join, group_by, segment, balance]

  - question: "Which customers have a portfolio with negative unrealized PnL?"
    expected_behavior: "Joins PORTFOLIOS to CUSTOMERS, filters UNREALIZED_PNL < 0, returns customer identity."
    difficulty: hard
    tags: [join, filter, pnl]

  - question: "What is the average YTD return percentage by portfolio strategy?"
    expected_behavior: "Groups PORTFOLIOS by STRATEGY, averages YTD_RETURN_PCT."
    difficulty: hard
    tags: [group_by, average, strategy]

  - question: "What is the total transaction amount by channel for the last 90 days?"
    expected_behavior: "Filters TRANSACTIONS by TRANSACTION_TIMESTAMP >= 90 days ago, groups by CHANNEL, sums AMOUNT."
    difficulty: hard
    tags: [filter, group_by, time, channel]

  - question: "Which High Net Worth customers have an open account with a balance over 100000?"
    expected_behavior: "Joins CUSTOMERS to ACCOUNTS, filters CUSTOMER_SEGMENT = 'High Net Worth', ACCOUNT_STATUS = 'Open', BALANCE > 100000."
    difficulty: hard
    tags: [join, multi_filter, segment]

  - question: "What is the average risk score by risk type for unresolved assessments?"
    expected_behavior: "Filters RISK_ASSESSMENTS where STATUS != 'Closed'/'Mitigated', groups by RISK_TYPE, averages RISK_SCORE."
    difficulty: hard
    tags: [filter, group_by, risk]

  - question: "Which customers have both a Critical risk assessment and a portfolio with High risk tolerance?"
    expected_behavior: "Joins RISK_ASSESSMENTS and PORTFOLIOS through CUSTOMERS, filters RISK_LEVEL = 'Critical' and RISK_TOLERANCE = 'High'."
    difficulty: hard
    tags: [multi_join, filter, risk]

  - question: "What is the credit limit utilization (balance / credit limit) by account type?"
    expected_behavior: "Computes ratio of BALANCE to CREDIT_LIMIT (guarding divide-by-zero), groups by ACCOUNT_TYPE."
    difficulty: hard
    tags: [calculation, ratio, group_by]
