questions:
  - question: "How many customers do we have?"
    expected_behavior: "Returns total count of customers from the CUSTOMERS table."
    difficulty: easy
    tags: [count, customers]

  - question: "What is the total balance across all accounts?"
    expected_behavior: "Sums the BALANCE fact on the ACCOUNTS table."
    difficulty: easy
    tags: [sum, accounts, balance]

  - question: "List all customer segments."
    expected_behavior: "Returns distinct values of CUSTOMER_SEGMENT (e.g. High Net Worth, Corporate, Institutional)."
    difficulty: easy
    tags: [distinct, segment]

  - question: "How many accounts are currently open?"
    expected_behavior: "Counts ACCOUNTS where ACCOUNT_STATUS = 'Open'."
    difficulty: easy
    tags: [count, accounts, filter]

  - question: "What is the average credit score of our customers?"
    expected_behavior: "Averages CREDIT_SCORE on the CUSTOMERS table."
    difficulty: easy
    tags: [average, credit_score]

  - question: "How many transactions were flagged for review?"
    expected_behavior: "Counts TRANSACTIONS where IS_FLAGGED = TRUE."
    difficulty: easy
    tags: [count, transactions, flagged]

  - question: "What is the total value of all portfolios?"
    expected_behavior: "Sums the TOTAL_VALUE fact on the PORTFOLIOS table."
    difficulty: easy
    tags: [sum, portfolios]

  - question: "How many risk assessments are marked as Critical?"
    expected_behavior: "Counts RISK_ASSESSMENTS where RISK_LEVEL = 'Critical'."
    difficulty: easy
    tags: [count, risk, filter]
